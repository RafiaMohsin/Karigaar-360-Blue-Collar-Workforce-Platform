<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job | Karigaar 360</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-light">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <div class="logo-wrapper me-2">
                    <i class="fas fa-tools text-warning floating"></i>
                </div>
                <span class="fw-bold"
                    style="background: linear-gradient(45deg, var(--primary-color), var(--primary-light)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Karigaar
                    360</span>
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Job Posting Form -->
    <div class="container py-5">
        <div class="row justify-content-center animate-up">
            <div class="col-lg-8 col-xl-7">
                <div class="card shadow-lg p-4 p-md-5">
                    <div class="text-center mb-5">
                        <i class="fas fa-clipboard-list fa-3x text-primary mb-3"></i>
                        <h2 class="fw-bold">Post a New Job</h2>
                        <p class="text-muted">Tell us what you need, and we'll find the right Karigaar.</p>
                    </div>

                    <form>
                        <div class="row g-3">
                            <div class="col-md-12 text-start">
                                <label class="form-label fw-semibold">Job Title</label>
                                <input type="text" class="form-control" placeholder="e.g. Fix leaking kitchen tap"
                                    required>
                            </div>
                            <div class="col-md-12 text-start">
                                <label class="form-label fw-semibold">Service Category</label>
                                <select class="form-select form-control" required>
                                    <option selected disabled value="">Select a category...</option>
                                    <option>Plumbing</option>
                                    <option>Electrical</option>
                                    <option>Carpentry</option>
                                    <option>Painting</option>
                                    <option>AC & Cooling</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div class="col-md-12 text-start">
                                <label class="form-label fw-semibold">Job Description</label>
                                <textarea class="form-control" rows="4"
                                    placeholder="Describe the problem in detail so Karigaars can provide better quotes..."
                                    required></textarea>
                            </div>
                            <div class="col-md-6 text-start">
                                <label class="form-label fw-semibold">Estimated Budget (Optional)</label>
                                <input type="number" class="form-control" placeholder="PKR 2,000">
                            </div>
                            <div class="col-md-6 text-start">
                                <label class="form-label fw-semibold">Urgency</label>
                                <select class="form-select form-control">
                                    <option>Within 2 Hours</option>
                                    <option selected>Today</option>
                                    <option>Within This Week</option>
                                </select>
                            </div>
                            <div class="col-md-12 text-start mt-3">
                                <label class="form-label fw-semibold">Current Location for Job</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" placeholder="Fetching location..."
                                        id="location-input">
                                    <button class="btn btn-outline-secondary" type="button"><i
                                            class="fas fa-map-marker-alt"></i></button>
                                </div>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-primary w-100 py-3 shadow">Post Job Now</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-5">
        <div class="container">
            <div class="text-center opacity-50 pb-3">
                <small>&copy; 2026 Karigaar 360. All rights reserved.</small>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
